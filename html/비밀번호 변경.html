<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no" />
    <title>비밀번호 변경</title>

    <!-- CSS -->
    <link rel="stylesheet" type="text/css" href="../css/site/output.css" />

    <!-- script -->
    <script defer src="../js/jquery-3.6.3/jquery.min.js"></script>
    <script defer src="../js/plugin/swiper-bundle.min.js"></script>
    <script defer src="../js/aos.js"></script>
    <script defer src="../js/component/ui-script.js"></script>
    <script defer src="../js/pattern/pattern.js"></script>
    <script defer src="../js/nav.js"></script>
    <script defer src="../js/app.js"></script>
  </head>

  <body>
    <div id="wrapper">
      <!-- 컨테이너 영역 -->
      <div id="container">
        <!-- breadcrumb -->
        <nav class="krds-breadcrumb-wrap" aria-label="현재 경로">
          <ol class="breadcrumb">
            <li class="home"><a href="main.html" class="txt" target="_self" title="메인 페이지로 이동">홈</a></li>
          </ol>
        </nav>
        <!-- // breadcrumb -->

        <!-- 컨텐츠 영역 -->
        <div class="inner">
          <!-- 페이지 타이틀 영역 -->
          <div class="page-title-wrap">
            <h1 class="h-tit">비밀번호 변경</h1>
          </div>
          <!-- //페이지 타이틀 영역 -->
          <div class="page_content page_pw_change">
              <div class="conts-area">
                <div class="wrap_pw_change">
                  <div class="conts-area">
                      <fieldset>
                      <legend>새 비밀번호 설정</legend>
                      <div class="fieldset">
                        <div class="form-group">
                          <div class="form-tit">
                            <label for="login_pw">새 비밀번호 입력</label>
                          </div>
                          <p class="label_info">영문 대소문자/숫자/특수문자 중 3가지 이상 조합 (8자 ~ 12자)</p>
                          <div class="form-conts btn-ico-wrap">
                            <input type="text" id="new_pw_r" class="krds-input" autocomplete="on" placeholder="새 비밀번호 입력" />
                            <button type="button" class="krds-btn medium icon" aria-pressed="false">
                              <span class="sr-only">입력한 비밀번호 보기</span>
                              <i class="svg-icon ico-pw-visible"></i>
                              <i class="svg-icon ico-pw-visible-on"></i>
                            </button>
                          </div>
                          <p class="form-hint-invalid">영문 대소문자/숫자/특수문자 중 3가지 이상 조합 (8자 ~ 12자)</p>
                        </div>
                        <div class="form-group">
                          <div class="form-tit">
                            <label for="login_pw">새 비밀번호 확인</label>
                          </div>
                          <div class="form-conts btn-ico-wrap">
                            <input type="text" id="new_pw_rw" class="krds-input" autocomplete="on" placeholder="새 비밀번호 확인" />
                            <button type="button" class="krds-btn medium icon" aria-pressed="false">
                              <span class="sr-only">입력한 비밀번호 보기</span>
                              <i class="svg-icon ico-pw-visible"></i>
                              <i class="svg-icon ico-pw-visible-on"></i>
                            </button>
                          </div>
                          <p class="form-hint-invalid">입력한 비밀번호와 일치하지 않습니다.</p>
                        </div>
                        <div class="page-btn-wrap both m-column">
                          <button type="submit" class="krds-btn large tertiary">취소</button>
                          <button type="submit" class="krds-btn large primary disabled">비밀번호 재설정</button>
                        </div>
                      </div>
                    </fieldset>
              </div>

                </div>
              </div>
              <!-- //컨텐츠 영역 -->
            </div>
          </div>
        <!-- //컨텐츠 영역 -->
      </div>
      <!-- //컨테이너 영역 -->
    </div>

  </body>
</html>
