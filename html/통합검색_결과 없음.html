                                <label class="krds-form-chip-outline" for="chk_chip_4">1년</label>

                        <div class="sch-form-wrap flex_inline">

                          <div class="form-group">

                  <li id="totalTab02" aria-selected="false" aria-controls="totalTabpanel02" aria-selected="false">

                  </li>
                  <li id="totalTab03" aria-selected="false" aria-controls="totalTabpanel03" aria-selected="false">

                  </li>
                  <li id="totalTab05" aria-selected="false" aria-controls="totalTabpanel05" aria-selected="false">

                  </li>

              <!-- tab contents -->

                        </div>
                        <div class="m-sort-btn">
                          <select class="krds-form-select-sort" id="sort6">

                      <li role="listitem">보다 일반적인 단어로 검색해 보세요.</li>
                    </ul>

                <section id="totalTabpanel02" role="tabpanel" aria-labelledby="totalTab02" class="tab-conts" hidden></section>

                <section id="totalTabpanel03" role="tabpanel" aria-labelledby="totalTab03" class="tab-conts" hidden></section>

                <section id="totalTabpanel04" role="tabpanel" aria-labelledby="totalTab04" class="tab-conts" hidden></section>

<script>

  // 검색기간 체크박스 전체선택/해제, 부분선택 처리
    document.querySelectorAll("[data-checkbox-group]").forEach((group) => {
      const checkAll = group.querySelector("[data-check-all]");
      const items = group.querySelectorAll("[data-check-item]");

      // 전체 클릭 시 → 나머지 전체 체크/해제
      checkAll.addEventListener("change", () => {
        items.forEach((item) => {
          item.checked = checkAll.checked;
        });
      });

      // 개별 체크 변경 시
      items.forEach((item) => {
        item.addEventListener("change", () => {
          const allChecked = [...items].every((i) => i.checked);
          const anyChecked = [...items].some((i) => i.checked);

          checkAll.checked = allChecked;
          checkAll.indeterminate = !allChecked && anyChecked;
        });
      });
  
    });

  document.addEventListener("DOMContentLoaded", () => {
    initTotalSchTab();
    initTotalSchPeriodSingleChk();
    initTotalSchDetailToggle(); 
  });

/* ------------------------------------------------------------------
 * 통합검색 - 탭 및 더보기 버튼 연동
 * ------------------------------------------------------------------ */
function initTotalSchTab() {
  const TOTAL_SCH_PANEL_ID = "totalTabpanel01";
  const totalSchPanel = document.getElementById(TOTAL_SCH_PANEL_ID);

  // 1. 전체 탭 내용 업데이트
  function updateTotalSchTab() {
    if (!totalSchPanel) return;
    const container = totalSchPanel.querySelector(".total-search-list");
    if (!container) return;

    container.innerHTML = "";
    document.querySelectorAll(".tab-conts:not(#" + TOTAL_SCH_PANEL_ID + ")").forEach(panel => {
      const title = panel.querySelector(".tab_conts_tit");
      const list = panel.querySelector(".total-search-list");
      if (title) container.appendChild(title.cloneNode(true));
      if (list) container.appendChild(list.cloneNode(true));
    });
  }

  // 2. 탭 활성화 실행 함수 (상단 탭과 더보기 버튼이 공유하는 기능)
  function executeTabSwitch(panelId) {
    const targetPanel = document.getElementById(panelId);
    const targetTabLi = document.querySelector(`li[aria-controls="${panelId}"]`);
    if (!targetPanel || !targetTabLi) return;

    // 모든 탭과 패널 비활성화
    document.querySelectorAll('[role="tablist"] li').forEach(li => {
      li.classList.remove("active");
      li.setAttribute("aria-selected", "false");
    });
    document.querySelectorAll(".tab-conts").forEach(panel => {
      panel.classList.remove("active");
    });

    // 선택된 탭과 패널 활성화
    targetTabLi.classList.add("active");
    targetTabLi.setAttribute("aria-selected", "true");
    targetPanel.classList.add("active");

    // 전체 탭(01)일 경우의 특수 로직 처리
    const mHideEl = document.querySelector(".sch-sort .m-hide");
    if (panelId === TOTAL_SCH_PANEL_ID) {
      updateTotalSchTab();
      if (mHideEl) mHideEl.style.display = "none";
    } else {
      if (mHideEl) mHideEl.style.display = "";
    }

    // 화면 위치 조정 (탭 영역 상단으로)
    const tabArea = document.querySelector('.krds-tab-area');
    if (tabArea) tabArea.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  // 3. [핵심] 이벤트 위임: 어떤 버튼(복제된 것 포함)이든 클릭하면 작동
  document.addEventListener("click", (e) => {
    // 클릭한 요소가 .btn-tab 클래스를 가지고 있는지 확인
    const btn = e.target.closest(".btn-tab");
    if (!btn) return;

    // 더보기 버튼이든 상단 탭이든 aria-controls에 적힌 패널 ID를 가져옴
    const panelId = btn.getAttribute("aria-controls");
    if (panelId) {
      // 탭 전환 기능을 똑같이 실행
      executeTabSwitch(panelId);
    }
  });

  // 초기 실행 (페이지 로드 시 전체 탭 활성화 상태라면 내용 생성)
  if (totalSchPanel?.classList.contains("active")) {
    updateTotalSchTab();
    const mHideEl = document.querySelector(".sch-sort .m-hide");
    if (mHideEl) mHideEl.style.display = "none";
  }
}


/* ------------------------------------------------------------------
   * 통합검색 - 검색기간 (단일 선택)
   * ------------------------------------------------------------------ */
  function initTotalSchPeriodSingleChk() {
    document.querySelectorAll(".krds-check-area").forEach(totalSchChkArea => {
        const totalSchChkAll =
          totalSchChkArea.querySelector("[data-check-all]");
        if (!totalSchChkAll) return;

        const totalSchChkItems = Array.from(
          totalSchChkArea.querySelectorAll(
            "input[type='checkbox']"
          )
        ).filter(chk => chk !== totalSchChkAll);

        totalSchChkAll.addEventListener("change", () => {
          if (totalSchChkAll.checked) {
            totalSchChkItems.forEach(
              chk => (chk.checked = false)
            );
          }
        });

        totalSchChkItems.forEach(totalSchChkItem => {
          totalSchChkItem.addEventListener("change", () => {
            if (totalSchChkItem.checked) {
              totalSchChkAll.checked = false;
              totalSchChkItems.forEach(chk => {
                if (chk !== totalSchChkItem) {
                  chk.checked = false;
                }
              });
            } else {
              const hasAnyChecked =
                totalSchChkItems.some(chk => chk.checked);
              if (!hasAnyChecked) {
                totalSchChkAll.checked = true;
              }
            }
          });
        });
      });
  }

  /* ------------------------------------------------------------------
   * 통합검색 - 상세검색 열기 / 닫기
   * ------------------------------------------------------------------ */
  function initTotalSchDetailToggle() {

    document.addEventListener("click", function (e) {

      const totalSchDetailBtn =
        e.target.closest(".btn_search_detail");
      if (!totalSchDetailBtn) return;

      const totalSchDetailArea =
        document.querySelector(".sch_form_bottom");
      if (!totalSchDetailArea) return;

      const isClosed =
        totalSchDetailArea.classList.contains("is-closed");

      totalSchDetailArea.classList.toggle(
        "is-closed",
        !isClosed
      );

      totalSchDetailBtn.setAttribute(
        "aria-expanded",
        String(isClosed)
      );

      totalSchDetailBtn.innerHTML = isClosed
        ? '<i class="svg-icon ico-sch-plus"></i>상세검색 닫기'
        : '<i class="svg-icon ico-sch-plus"></i>상세검색';
    });
  }

</script>
